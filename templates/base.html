<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Exchange</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'home' %}" class="logo">Skill Exchange</a>
            <div class="nav-links">
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard' %}">Dashboard</a>
                    <a href="mailto:suporte@skillexchange.com">Suporte</a>
                    <div class="dropdown">
                        <button class="dropbtn">{{ user.full_name }} ▾</button>
                        <div class="dropdown-content">
                            <a href="{% url 'profile' %}">Meu Perfil</a>
                            <a href="{% url 'logout' %}">Sair</a>
                        </div>
                    </div>
                {% else %}
                    <a href="{% url 'login' %}">Entrar</a>
                    <a href="{% url 'signup' %}" class="btn">Cadastrar</a>
                {% endif %}
            </div>
        </nav>
    </header>

    <main>
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="alert {{ message.tags }}" style="background: var(--success); color: white; padding: 1rem; border-radius: 6px; margin-bottom: 1.5rem; text-align: center;">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}
        {% endblock content %}
    </main>
</body>
</html>
